<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Group</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}

/* HEADER */
header{
position:fixed;
width:100%;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:rgba(0,0,0,0.8);
z-index:1000;
}

header a{
color:white;
margin-left:15px;
text-decoration:none;
}

.btn{
background:#c9a857;
padding:10px 20px;
border-radius:5px;
color:black;
border:none;
cursor:pointer;
}

/* HERO */
.hero{
height:80vh;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

/* SECTION */
.section{
padding:100px 20px 40px;
text-align:center;
}

/* FILTROS */
input{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}

/* CARDS */
.cards{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
width:300px;
cursor:pointer;
transition:0.3s;
}

.card:hover{transform:translateY(-5px)}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{color:#c9a857;font-weight:bold}

@media(max-width:768px){
.hero{height:50vh}
.card{width:90%}
}
</style>
</head>

<body>

<header>
  <div><b>NR Group</b></div>
  <nav>
    <a href="#propiedades">Propiedades</a>
  </nav>
</header>

<section class="hero">
  <h1>Encuentra tu propiedad ideal</h1>
</section>

<section id="propiedades" class="section">

<h2>Propiedades</h2>

<div>
  <input type="text" id="filtroCiudad" placeholder="Ciudad">
  <input type="number" id="filtroPrecio" placeholder="Precio máximo">
  <button onclick="filtrar()" class="btn">Buscar</button>
</div>

<div id="propiedades-container" class="cards"></div>

</section>

<script>
let data=[];

async function cargarPropiedades(){
  const res=await fetch("https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec?action=read_propiedades");
  const json=await res.json();
  data=json.data;
  render(data);
}

function optimizar(url,size=600){
  if(url.includes("res.cloudinary.com")){
    return url.replace("/upload/", `/upload/w_${size},q_auto,f_auto/`);
  }
  return url;
}

function render(lista){
  const c=document.getElementById("propiedades-container");
  c.innerHTML="";

  lista.forEach(p=>{
    let img=p.FOTO1||"https://images.unsplash.com/photo-1560448204-e02f11c3d0e2";

    const precio=p.PRECIO 
      ? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(p.PRECIO)
      : "Consultar";

    c.innerHTML+=`
      <div class="card" onclick='verPropiedad(${JSON.stringify(p)})'>
        <img src="${optimizar(img)}">
        <h3>${p.TITULO}</h3>
        <p>${p.CIUDAD}</p>
        <p class="price">${precio}</p>
      </div>
    `;
  });
}

function verPropiedad(p){
  localStorage.setItem("propiedad",JSON.stringify(p));
  window.location.href="propiedad.html";
}

function filtrar(){
  const ciudad=document.getElementById("filtroCiudad").value.toLowerCase();
  const precio=document.getElementById("filtroPrecio").value;

  const f=data.filter(p=>{
    return(
      (!ciudad||p.CIUDAD?.toLowerCase().includes(ciudad)) &&
      (!precio||p.PRECIO<=precio)
    );
  });

  render(f);
}

cargarPropiedades();
</script>

</body>
</html>
