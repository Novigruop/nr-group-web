<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Group</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:#0b0b0b;
color:white;
padding-top:80px;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
background:#111;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
z-index:1000;
}

.logo{font-weight:bold}

/* HERO */
.hero{
height:60vh;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* 🔥 FILTRO CENTRAL */
.buscador{
background:white;
padding:15px;
border-radius:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.buscador select,
.buscador input{
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}

.buscador button{
background:#c9a857;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

/* CARDS */
.section{
padding:40px 20px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
width:300px;
text-align:left;
position:relative;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{color:#c9a857}

/* PREMIUM */
.premium{
border:2px solid #c9a857;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#c9a857;
color:black;
padding:5px;
border-radius:5px;
font-size:12px;
}

/* WHATSAPP */
.wa-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:24px;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
text-decoration:none;
}

</style>
</head>

<body>

<header class="navbar">
  <div class="logo">NR Group</div>
</header>

<!-- HERO + FILTRO -->
<section class="hero">

<h1>Encuentra tu propiedad ideal</h1>

<div class="buscador">

<select id="tipo">
<option value="">Tipo</option>
<option value="VENTA">Venta</option>
<option value="ARRIENDO">Arriendo</option>
</select>

<select id="categoria">
<option value="">Categoría</option>
<option value="APARTAMENTO">Apartamento</option>
<option value="CASA">Casa</option>
<option value="LOCAL">Local</option>
<option value="BODEGA">Bodega</option>
<option value="OFICINA">Oficina</option>
</select>

<input type="text" id="ciudad" placeholder="Ciudad">

<input type="number" id="precio" placeholder="Precio máximo">

<button onclick="buscar()">Buscar</button>

</div>

</section>

<!-- RESULTADOS -->
<section class="section">
<div id="propiedades-container" class="cards"></div>
</section>

<a href="https://wa.me/573016492983" class="wa-float">💬</a>

<script>
let data=[];

/* CARGAR DATA */
async function cargar(){
const res=await fetch("https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec?action=read_propiedades");
const json=await res.json();
data=json.data;

/* 🔥 SI HAY PARAMETROS EN URL */
leerURL();
}

/* RENDER */
function render(lista){
const c=document.getElementById("propiedades-container");
c.innerHTML="";

lista.forEach(p=>{
let img=p.FOTO1 || "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2";

const precio=p.PRECIO 
? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(p.PRECIO)
: "Consultar";

const id=p.ID;

const destacado = (p.DESTACADO||"")=="SI";

c.innerHTML+=`
<div class="card ${destacado?'premium':''}">
${destacado?'<div class="badge">⭐ PREMIUM</div>':''}
<img src="${img}">
<h3>${p.TITULO}</h3>
<p>${p.CIUDAD}</p>
<p class="price">${precio}</p>
<a href="propiedad.html?id=${id}">Ver</a>
</div>
`;
});
}

/* 🔥 BUSQUEDA AVANZADA */
function buscar(){

const tipo=document.getElementById("tipo").value;
const categoria=document.getElementById("categoria").value;
const ciudad=document.getElementById("ciudad").value.toLowerCase();
const precio=document.getElementById("precio").value;

/* URL DINAMICA */
const url = new URL(window.location);

if(tipo) url.searchParams.set("tipo",tipo);
if(categoria) url.searchParams.set("categoria",categoria);
if(ciudad) url.searchParams.set("ciudad",ciudad);
if(precio) url.searchParams.set("precio",precio);

window.history.pushState({},'',url);

/* FILTRAR */
const f=data.filter(p=>{
return(
(!tipo||p.TIPO==tipo) &&
(!categoria||p.CATEGORIA?.includes(categoria)) &&
(!ciudad||p.CIUDAD?.toLowerCase().includes(ciudad)) &&
(!precio||p.PRECIO<=precio)
);
});

render(f);
}

/* 🔥 LEER URL */
function leerURL(){
const params=new URLSearchParams(window.location.search);

document.getElementById("tipo").value=params.get("tipo")||"";
document.getElementById("categoria").value=params.get("categoria")||"";
document.getElementById("ciudad").value=params.get("ciudad")||"";
document.getElementById("precio").value=params.get("precio")||"";

buscar();
}

cargar();
</script>

</body>
</html>
