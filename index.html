<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Group</title>

<style>
body{font-family:Arial;background:#0b0b0b;color:white;margin:0}
.section{padding:40px;text-align:center}
.cards{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.card{background:#111;padding:15px;border-radius:10px;width:280px;cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px}
.price{color:#c9a857;font-weight:bold}

input,button{
padding:10px;
margin:5px;
border-radius:5px;
border:none;
}
button{background:#c9a857;cursor:pointer}
</style>
</head>

<body>

<section class="section">

<h2>Propiedades</h2>

<div>
  <input type="text" id="filtroCiudad" placeholder="Ciudad">
  <input type="number" id="filtroPrecio" placeholder="Precio máximo">
  <button onclick="filtrar()">Buscar</button>
</div>

<div id="propiedades-container" class="cards"></div>

</section>

<script>
let data = [];

async function cargarPropiedades() {
  const res = await fetch("https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec?action=read_propiedades");
  const json = await res.json();
  data = json.data;
  renderPropiedades(data);
}

function renderPropiedades(lista){
  const container = document.getElementById("propiedades-container");
  container.innerHTML = "";

  lista.forEach(p => {

    let imagen = p.FOTO1 || "";

    if (imagen.includes("res.cloudinary.com")) {
      imagen = imagen.replace("/upload/", "/upload/w_600,q_auto,f_auto/");
    }

    if (!imagen) {
      imagen = "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2";
    }

    const precio = p.PRECIO 
      ? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(p.PRECIO)
      : "Consultar";

    const card = `
      <div class="card" onclick='verPropiedad(${JSON.stringify(p)})'>
        <img src="${imagen}">
        <h3>${p.TITULO}</h3>
        <p>${p.CIUDAD}</p>
        <p class="price">${precio}</p>
      </div>
    `;

    container.innerHTML += card;
  });
}

function verPropiedad(p){
  localStorage.setItem("propiedad", JSON.stringify(p));
  window.location.href = "propiedad.html";
}

function filtrar(){
  const ciudad = document.getElementById("filtroCiudad").value.toLowerCase();
  const precioMax = document.getElementById("filtroPrecio").value;

  const filtrados = data.filter(p => {
    return (
      (!ciudad || p.CIUDAD?.toLowerCase().includes(ciudad)) &&
      (!precioMax || p.PRECIO <= precioMax)
    );
  });

  renderPropiedades(filtrados);
}

cargarPropiedades();
</script>

</body>
</html>
