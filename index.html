<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Group</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#0b0b0b;color:white}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.85);
z-index:1000;
}

header nav{display:flex;gap:20px}
header a{color:white;text-decoration:none}

/* HERO */
.hero{
height:70vh;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding-top:60px;
}

/* SECTION */
.section{
padding:120px 20px 40px;
text-align:center;
}

/* FILTROS */
.filtros{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:30px;
}

input{
padding:10px;
border-radius:6px;
border:none;
}

.btn{
background:#c9a857;
color:black;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
display:inline-block;
text-decoration:none;
}

/* CARDS */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
width:300px;
text-align:left;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{color:#c9a857;font-weight:bold}

@media(max-width:768px){
.card{width:90%}
}
</style>
</head>

<body>

<header>
  <div><b>NR Group</b></div>
  <nav>
    <a href="#propiedades">Propiedades</a>
  </nav>
</header>

<section class="hero">
  <h1>Encuentra tu propiedad ideal</h1>
</section>

<section id="propiedades" class="section">

<h2>Propiedades</h2>

<div class="filtros">
  <input type="text" id="filtroCiudad" placeholder="Ciudad">
  <input type="number" id="filtroPrecio" placeholder="Precio máximo">
  <button onclick="filtrar()" class="btn">Buscar</button>
</div>

<div id="propiedades-container" class="cards"></div>

</section>

<script>
let data=[];

async function cargar(){
const res=await fetch("https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec?action=read_propiedades");
const json=await res.json();
data=json.data;
render(data);
}

function optimizar(url){
if(url.includes("res.cloudinary.com")){
return url.replace("/upload/","/upload/w_600,q_auto,f_auto/");
}
return url;
}

function render(lista){
const c=document.getElementById("propiedades-container");
c.innerHTML="";

lista.forEach(p=>{
let img=p.FOTO1 || "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2";

const precio=p.PRECIO 
? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(p.PRECIO)
: "Consultar";

const id = p.ID || p.id || p.Id;

c.innerHTML+=`
<div class="card">
<img src="${optimizar(img)}">
<h3>${p.TITULO}</h3>
<p>${p.CIUDAD}</p>
<p class="price">${precio}</p>

<a href="propiedad.html?id=${id}" class="btn">
Ver propiedad
</a>
</div>
`;
});
}

function filtrar(){
const ciudad=document.getElementById("filtroCiudad").value.toLowerCase();
const precio=document.getElementById("filtroPrecio").value;

const f=data.filter(p=>{
return(
(!ciudad||p.CIUDAD?.toLowerCase().includes(ciudad)) &&
(!precio||p.PRECIO<=precio)
);
});

render(f);
}

cargar();
</script>

</body>
</html>
