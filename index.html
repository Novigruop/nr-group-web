<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NR Group</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:#0b0b0b;
color:white;
padding-top:90px;
}

/* 🔥 NAVBAR PREMIUM */
.navbar{
position:fixed;
top:0;
width:100%;
background:rgba(0,0,0,0.85);
backdrop-filter: blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
z-index:1000;
}

.logo{
font-weight:700;
font-size:20px;
letter-spacing:1px;
}

/* MENU */
.menu{
list-style:none;
display:flex;
gap:25px;
align-items:center;
}

.menu a{
color:#ddd;
text-decoration:none;
font-size:14px;
transition:0.3s;
}

.menu a:hover{
color:white;
}

/* CTA */
.cta{
background:linear-gradient(135deg,#c9a857,#e5c87a);
color:black;
padding:10px 18px;
border-radius:8px;
font-size:14px;
font-weight:bold;
text-decoration:none;
transition:0.3s;
}

.cta:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(201,168,87,0.4);
}

/* HERO */
.hero{
height:60vh;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* 🔥 BUSCADOR CENTRADO */
.buscador{
background:white;
padding:15px;
border-radius:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.buscador select,
.buscador input{
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}

.buscador button{
background:#c9a857;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

/* SECTION */
.section{
padding:40px 20px;
text-align:center;
}

/* CARDS */
.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
width:300px;
text-align:left;
position:relative;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.price{color:#c9a857}

/* PREMIUM */
.premium{
border:2px solid #c9a857;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#c9a857;
color:black;
padding:5px;
border-radius:5px;
font-size:12px;
}

/* WHATSAPP */
.wa-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:24px;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
.menu{display:none}
.hero h1{font-size:24px}
.card{width:90%}
}
</style>
</head>

<body>

<!-- 🔥 HEADER -->
<header class="navbar">

  <div class="logo">NR Group</div>

  <nav>
    <ul class="menu">
      <li><a href="#">Nosotros</a></li>
      <li><a href="#propiedades">Propiedades</a></li>
      <li><a href="#">Servicios</a></li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">Contacto</a></li>
    </ul>
  </nav>

  <a href="https://wa.me/573016492983?text=Hola%20quiero%20vender%20o%20arrendar%20mi%20propiedad"
     target="_blank"
     class="cta">
     Vende o arrienda con nosotros
  </a>

</header>

<!-- HERO -->
<section class="hero">

<h1>Encuentra tu propiedad ideal</h1>

<div class="buscador">

<select id="tipo">
<option value="">Tipo</option>
<option value="VENTA">Venta</option>
<option value="ARRIENDO">Arriendo</option>
</select>

<select id="categoria">
<option value="">Categoría</option>
<option value="APARTAMENTO">Apartamento</option>
<option value="CASA">Casa</option>
<option value="LOCAL">Local</option>
<option value="BODEGA">Bodega</option>
<option value="OFICINA">Oficina</option>
</select>

<input type="text" id="ciudad" placeholder="Ciudad">

<input type="number" id="precio" placeholder="Precio máximo">

<button onclick="buscar()">Buscar</button>

</div>

</section>

<!-- PROPIEDADES -->
<section id="propiedades" class="section">
<div id="propiedades-container" class="cards"></div>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/573016492983" class="wa-float">💬</a>

<script>
let data=[];

async function cargar(){
const res=await fetch("https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec?action=read_propiedades");
const json=await res.json();
data=json.data;
leerURL();
}

function render(lista){
const c=document.getElementById("propiedades-container");
c.innerHTML="";

lista.forEach(p=>{
let img=p.FOTO1 || "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2";

const precio=p.PRECIO 
? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(p.PRECIO)
: "Consultar";

const id=p.ID;
const destacado=(p.DESTACADO||"")=="SI";

c.innerHTML+=`
<div class="card ${destacado?'premium':''}">
${destacado?'<div class="badge">⭐ PREMIUM</div>':''}
<img src="${img}">
<h3>${p.TITULO}</h3>
<p>${p.CIUDAD}</p>
<p class="price">${precio}</p>
<a href="propiedad.html?id=${id}">Ver</a>
</div>
`;
});
}

/* BUSQUEDA */
function buscar(){

const tipo=document.getElementById("tipo").value;
const categoria=document.getElementById("categoria").value;
const ciudad=document.getElementById("ciudad").value.toLowerCase();
const precio=document.getElementById("precio").value;

/* URL */
const url=new URL(window.location);
if(tipo) url.searchParams.set("tipo",tipo);
if(categoria) url.searchParams.set("categoria",categoria);
if(ciudad) url.searchParams.set("ciudad",ciudad);
if(precio) url.searchParams.set("precio",precio);
window.history.pushState({},'',url);

/* FILTRO */
const f=data.filter(p=>{
return(
(!tipo||p.TIPO==tipo) &&
(!categoria||p.CATEGORIA?.includes(categoria)) &&
(!ciudad||p.CIUDAD?.toLowerCase().includes(ciudad)) &&
(!precio||p.PRECIO<=precio)
);
});

render(f);
}

/* LEER URL */
function leerURL(){
const params=new URLSearchParams(window.location.search);

document.getElementById("tipo").value=params.get("tipo")||"";
document.getElementById("categoria").value=params.get("categoria")||"";
document.getElementById("ciudad").value=params.get("ciudad")||"";
document.getElementById("precio").value=params.get("precio")||"";

buscar();
}

cargar();
</script>

</body>
</html>
