<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos</title>

<style>
body{font-family:Arial;background:#0b0b0b;color:white;margin:0}
.cards{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;padding:20px}
.card{background:#111;width:300px;border-radius:10px;overflow:hidden}
.card img{width:100%;height:200px;object-fit:cover}
.card-content{padding:15px}
.btn{background:#c9a857;padding:10px;border-radius:6px;text-decoration:none;color:black}
</style>
</head>

<body>

<h1 style="text-align:center;margin-top:20px">Proyectos</h1>

<div id="cards" class="cards"></div>

<script>

const URL = "PEGA_AQUI_TU_SCRIPT";

async function cargar(){

const res = await fetch(URL);
const json = await res.json();
const data = json.data;

const c = document.getElementById("cards");

data.forEach(p=>{

c.innerHTML += `
<div class="card">
<img src="${p.IMAGEN}">
<div class="card-content">
<h3>${p.TITULO}</h3>
<p>${p.CIUDAD}</p>
<p>${p.PRECIO}</p>
<a href="proyecto.html?id=${p.ID}" class="btn">Ver</a>
</div>
</div>
`;

});

}

cargar();

</script>

</body>
</html>
