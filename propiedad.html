<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detalle propiedad</title>

<style>
body{
  font-family:Arial;
  background:#0b0b0b;
  color:white;
  margin:0;
  padding:0;
}

/* CONTENEDOR */
.container{
  max-width:900px;
  margin:40px auto;
  padding:20px;
}

/* IMAGEN PRO */
.imagen-propiedad{
  width:100%;
  height:400px;
  object-fit:cover;
  border-radius:12px;
  display:block;
  margin-bottom:20px;
}

/* TEXTOS */
h1{
  margin-bottom:5px;
}

.ciudad{
  color:#aaa;
  margin-bottom:10px;
}

.price{
  color:#c9a857;
  font-size:28px;
  font-weight:bold;
  margin:10px 0;
}

.descripcion{
  line-height:1.6;
  margin-top:15px;
}

/* BOTÓN */
.btn{
  background:#25D366;
  color:white;
  padding:15px 25px;
  display:inline-block;
  margin-top:30px;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
}

/* TARJETA */
.card{
  background:#111;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="container">
  <div id="contenido"></div>
</div>

<script>
const data = localStorage.getItem("propiedad");

if (!data) {
  document.getElementById("contenido").innerHTML = `
    <h2>No se encontró la propiedad</h2>
    <p>Vuelve al inicio y selecciona una propiedad.</p>
  `;
} else {

  const p = JSON.parse(data);

  let imagen = p.FOTO1 || p.IMAGEN || p.imagen || "";

  // optimizar cloudinary
  if (imagen.includes("res.cloudinary.com")) {
    imagen = imagen.replace("/upload/", "/upload/w_900,q_auto,f_auto/");
  }

  // fallback
  if (!imagen) {
    imagen = "https://images.unsplash.com/photo-1560448204-e02f11c3d0e2";
  }

  const precio = p.PRECIO 
    ? new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        maximumFractionDigits: 0
      }).format(p.PRECIO)
    : "Consultar";

  document.getElementById("contenido").innerHTML = `
    <div class="card">
      <img class="imagen-propiedad" src="${imagen}">
      
      <h1>${p.TITULO || 'Propiedad'}</h1>
      <p class="ciudad">${p.CIUDAD || ''}</p>

      <p class="price">${precio}</p>

      <p class="descripcion">
        ${p.DESCRIPCION || 'Sin descripción disponible'}
      </p>

      <a class="btn" href="https://wa.me/573016492983?text=Hola quiero información de ${encodeURIComponent(p.TITULO || '')}">
        Contactar por WhatsApp
      </a>
    </div>
  `;
}
</script>

</body>
</html>
