<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha propiedad</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{font-family:Arial;background:white;color:#111;margin:0}

/* CONTENEDOR */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* SLIDER */
.slider img{
width:100%;
height:400px;
object-fit:cover;
border-radius:10px;
}

/* MINI */
.miniaturas{
display:flex;
gap:8px;
margin-top:10px;
overflow-x:auto;
}

.miniaturas img{
width:80px;
height:60px;
object-fit:cover;
border-radius:5px;
cursor:pointer;
opacity:.7;
}

.miniaturas img:hover{opacity:1}

.price{
font-size:22px;
margin:10px 0;
font-weight:bold;
}

.desc{
margin-top:10px;
line-height:1.5;
}

.pdf-btn{
margin-top:20px;
padding:12px 20px;
background:black;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container" id="ficha">
  <div id="contenido"></div>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
document.getElementById("contenido").innerHTML="<h2>Propiedad no encontrada</h2>";
}

/* CARGAR */
async function cargar(){

const res = await fetch("https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec?action=read_propiedades");
const json = await res.json();
const data = json.data;

/* BUSCAR */
const p = data.find(x => String(x.ID || x.id || x.Id) === String(id));

if(!p){
document.getElementById("contenido").innerHTML="<h2>No disponible</h2>";
return;
}

/* CAMPOS */
function getCampo(o,keys){
for(let k of keys){
if(o[k]) return o[k];
}
return "";
}

const titulo = getCampo(p,["TITULO","titulo","nombre"]);
const ciudad = getCampo(p,["CIUDAD","ciudad"]);
const precioRaw = getCampo(p,["PRECIO","precio"]);
const descripcion = getCampo(p,["DESCRIPCION","descripcion"]);

const precio = precioRaw
? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(precioRaw)
: "Consultar";

/* FOTOS */
const fotos = [
p.FOTO1,p.FOTO2,p.FOTO3,p.FOTO4,
p.FOTO5,p.FOTO6,p.FOTO7,p.FOTO8,
p.FOTO9,p.FOTO10
].filter(f=>f && f.startsWith("http"));

if(fotos.length===0){
fotos.push("https://images.unsplash.com/photo-1560448204-e02f11c3d0e2");
}

/* OPTIMIZAR */
function opt(url){
if(url.includes("res.cloudinary.com")){
return url.replace("/upload/","/upload/w_1200,q_auto,f_auto/");
}
return url;
}

/* MINI */
const thumbs = fotos.map((f,i)=>`
<img src="${opt(f)}" onclick="ir(${i})">
`).join("");

/* RENDER */
document.getElementById("contenido").innerHTML=`
<div class="slider">
<img id="img" src="${opt(fotos[0])}">
</div>

<div class="miniaturas">${thumbs}</div>

<h1>${titulo}</h1>
<p>${ciudad}</p>
<p class="price">${precio}</p>

<div class="desc">${descripcion}</div>

<button class="pdf-btn" onclick="pdf()">📄 Descargar PDF</button>
`;

/* CAMBIAR IMG */
window.ir=function(i){
document.getElementById("img").src=opt(fotos[i]);
}

}

cargar();

/* PDF */
function pdf(){
const element=document.getElementById("ficha");

html2pdf().set({
margin:0.5,
filename:'propiedad.pdf',
html2canvas:{scale:2},
jsPDF:{unit:'in',format:'letter'}
}).from(element).save();
}

</script>

</body>
</html>
