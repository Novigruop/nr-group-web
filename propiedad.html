<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detalle propiedad</title>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white}

/* HEADER */
.header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px 20px;
background:rgba(0,0,0,0.8);
z-index:1000;
}

.header a{color:white;text-decoration:none;margin-left:10px}

/* VOLVER */
.btn-volver{
position:fixed;
top:60px;
left:20px;
background:#111;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

/* CONTENIDO */
.container{
max-width:900px;
margin:100px auto;
padding:20px;
}

/* SLIDER */
.slider{position:relative}

.slider img{
width:100%;
height:400px;
object-fit:cover;
border-radius:10px;
}

/* FLECHAS */
.flecha{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:50%;
}

.izq{left:10px}
.der{right:10px}

/* MINIATURAS */
.miniaturas{
display:flex;
gap:10px;
margin-top:10px;
overflow-x:auto;
}

.miniaturas img{
width:80px;
height:60px;
object-fit:cover;
border-radius:5px;
cursor:pointer;
opacity:0.7;
}

.miniaturas img:hover{opacity:1}

.price{color:#c9a857;font-size:26px;font-weight:bold}

.btn{
background:#25D366;
padding:12px 20px;
color:white;
display:inline-block;
margin-top:20px;
text-decoration:none;
border-radius:6px;
}

/* RESPONSIVE */
@media(max-width:768px){
.slider img{height:250px}
.container{padding:15px}
}
</style>
</head>

<body>

<div class="header">
  <div>NR Group</div>
  <div>
    <a href="index.html">Inicio</a>
    <a href="index.html#propiedades">Propiedades</a>
  </div>
</div>

<div class="btn-volver" onclick="volver()">← Volver</div>

<div class="container">
  <div id="contenido"></div>
</div>

<script>
let p=JSON.parse(localStorage.getItem("propiedad"));

if(!p){
document.getElementById("contenido").innerHTML=`
<h2>Propiedad no disponible</h2>
<a href="index.html" class="btn">Volver</a>
`;
throw new Error("Sin datos");
}

const fotos=[
p.FOTO1,p.FOTO2,p.FOTO3,p.FOTO4,
p.FOTO5,p.FOTO6,p.FOTO7,p.FOTO8,
p.FOTO9,p.FOTO10
].filter(f=>f);

let index=0;

function optimizar(url,size=900){
if(url.includes("res.cloudinary.com")){
return url.replace("/upload/",`/upload/w_${size},q_auto,f_auto/`);
}
return url;
}

const precio=p.PRECIO 
? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(p.PRECIO)
: "Consultar";

const thumbs=fotos.map((f,i)=>`<img src="${optimizar(f,150)}" onclick="ir(${i})">`).join("");

document.getElementById("contenido").innerHTML=`
<div class="slider">
<button class="flecha izq" onclick="prev()">←</button>
<img id="img" src="${optimizar(fotos[0])}">
<button class="flecha der" onclick="next()">→</button>
</div>

<div class="miniaturas">${thumbs}</div>

<h1>${p.TITULO}</h1>
<p>${p.CIUDAD}</p>
<p class="price">${precio}</p>

<a class="btn" href="https://wa.me/573016492983?text=Hola estoy interesado en ${p.TITULO}">
WhatsApp
</a>
`;

function ir(i){index=i;update();}
function next(){index=(index+1)%fotos.length;update();}
function prev(){index=(index-1+fotos.length)%fotos.length;update();}
function update(){document.getElementById("img").src=optimizar(fotos[index]);}

function volver(){window.history.back();}
</script>

</body>
</html>
