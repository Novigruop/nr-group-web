<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detalle propiedad</title>

<style>
body{font-family:Arial;background:#0b0b0b;color:white;padding:20px}
img{width:100%;border-radius:10px;margin-bottom:20px}
.price{color:#c9a857;font-size:24px;font-weight:bold}
.btn{
background:#25D366;
color:white;
padding:15px;
display:inline-block;
margin-top:20px;
text-decoration:none;
border-radius:5px;
}
</style>
</head>

<body>

<div id="contenido"></div>

<script>
const p = JSON.parse(localStorage.getItem("propiedad"));

let imagen = p.FOTO1 || "";

if (imagen.includes("res.cloudinary.com")) {
  imagen = imagen.replace("/upload/", "/upload/w_800,q_auto,f_auto/");
}

const precio = p.PRECIO 
  ? new Intl.NumberFormat('es-CO', {
      style: 'currency',
      currency: 'COP',
      maximumFractionDigits: 0
    }).format(p.PRECIO)
  : "Consultar";

document.getElementById("contenido").innerHTML = `
  <img src="${imagen}">
  <h1>${p.TITULO}</h1>
  <p>${p.CIUDAD}</p>
  <p class="price">${precio}</p>
  <p>${p.DESCRIPCION || ''}</p>

  <a class="btn" href="https://wa.me/573016492983?text=Hola%20quiero%20información%20de%20${encodeURIComponent(p.TITULO)}">
    Contactar por WhatsApp
  </a>
`;
</script>

</body>
</html>
