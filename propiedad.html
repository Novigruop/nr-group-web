<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detalle propiedad</title>

<style>
body{font-family:Arial;background:#0b0b0b;color:white;margin:0}
.container{max-width:900px;margin:40px auto;padding:20px}

.slider img{
width:100%;
height:400px;
object-fit:cover;
border-radius:12px;
}

.miniaturas{
display:flex;
gap:10px;
margin-top:10px;
}

.miniaturas img{
width:80px;
height:60px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
opacity:0.7;
}

.miniaturas img:hover{opacity:1}

.price{color:#c9a857;font-size:28px;font-weight:bold}

.btn{
background:#25D366;
color:white;
padding:15px 25px;
display:inline-block;
margin-top:30px;
text-decoration:none;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
  <div id="contenido"></div>
</div>

<script>
const p = JSON.parse(localStorage.getItem("propiedad"));

let imagen = p.FOTO1 || "";

if (imagen.includes("res.cloudinary.com")) {
  imagen = imagen.replace("/upload/", "/upload/w_900,q_auto,f_auto/");
}

const precio = p.PRECIO 
  ? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(p.PRECIO)
  : "Consultar";

document.getElementById("contenido").innerHTML = `
  <div class="slider">
    <img id="imgPrincipal" src="${imagen}">
  </div>

  <div class="miniaturas">
    ${p.FOTO1 ? `<img src="${p.FOTO1}" onclick="cambiarImagen('${p.FOTO1}')">` : ''}
    ${p.FOTO2 ? `<img src="${p.FOTO2}" onclick="cambiarImagen('${p.FOTO2}')">` : ''}
    ${p.FOTO3 ? `<img src="${p.FOTO3}" onclick="cambiarImagen('${p.FOTO3}')">` : ''}
    ${p.FOTO4 ? `<img src="${p.FOTO4}" onclick="cambiarImagen('${p.FOTO4}')">` : ''}
  </div>

  <h1>${p.TITULO}</h1>
  <p>${p.CIUDAD}</p>
  <p class="price">${precio}</p>

  <a class="btn" href="https://wa.me/573016492983?text=Hola estoy interesado en ${p.TITULO} en ${p.CIUDAD} por ${precio}">
    Contactar por WhatsApp
  </a>
`;

function cambiarImagen(src){
  if (src.includes("res.cloudinary.com")) {
    src = src.replace("/upload/", "/upload/w_900,q_auto,f_auto/");
  }
  document.getElementById("imgPrincipal").src = src;
}
</script>

</body>
</html>
