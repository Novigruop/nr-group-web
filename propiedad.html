<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle propiedad</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* HEADER */
.header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(0,0,0,0.85);
z-index:1000;
}

.header nav{
display:flex;
gap:15px;
}

.header a{
color:white;
text-decoration:none;
font-size:14px;
}

/* CONTENEDOR */
.container{
max-width:900px;
margin:90px auto;
padding:20px;
}

/* SLIDER */
.slider{
position:relative;
}

.slider img{
width:100%;
height:350px;
object-fit:cover;
border-radius:10px;
}

/* FLECHAS */
.flecha{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.5);
color:white;
border:none;
padding:10px;
border-radius:50%;
cursor:pointer;
}

.izq{left:10px}
.der{right:10px}

/* MINIATURAS */
.miniaturas{
display:flex;
gap:8px;
margin-top:10px;
overflow-x:auto;
}

.miniaturas img{
width:70px;
height:50px;
object-fit:cover;
border-radius:5px;
cursor:pointer;
opacity:.7;
}

.miniaturas img:hover{opacity:1}

/* INFO */
.info{
margin-top:20px;
}

.price{
color:#c9a857;
font-size:24px;
margin:10px 0;
}

.btn{
background:#25D366;
padding:12px 20px;
color:white;
display:inline-block;
border-radius:6px;
margin-top:20px;
text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
.slider img{height:250px}
.container{padding:15px}
}
</style>
</head>

<body>

<div class="header">
  <div><b>NR Group</b></div>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="index.html#propiedades">Propiedades</a>
  </nav>
</div>

<div class="container">
  <div id="contenido"></div>
</div>

<script>
let p = null;

try{
  p = JSON.parse(localStorage.getItem("propiedad"));
}catch(e){}

/* SI NO HAY DATOS */
if(!p){
document.getElementById("contenido").innerHTML=`
<h2>⚠️ No se pudo cargar la propiedad</h2>
<p>Ingresa desde el listado</p>
<br>
<a href="index.html" class="btn">Volver</a>
`;
throw new Error("Sin datos");
}

/* FOTOS SEGURAS */
const fotos = [
p.FOTO1,p.FOTO2,p.FOTO3,p.FOTO4,
p.FOTO5,p.FOTO6,p.FOTO7,p.FOTO8,
p.FOTO9,p.FOTO10
].filter(f => f && f.startsWith("http"));

/* SI NO HAY FOTOS */
if(fotos.length === 0){
fotos.push("https://images.unsplash.com/photo-1560448204-e02f11c3d0e2");
}

let index = 0;

/* OPTIMIZAR */
function opt(url){
if(url.includes("res.cloudinary.com")){
return url.replace("/upload/","/upload/w_900,q_auto,f_auto/");
}
return url;
}

/* PRECIO */
const precio = p.PRECIO 
? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(p.PRECIO)
: "Consultar";

/* MINIATURAS */
const thumbs = fotos.map((f,i)=>`
<img src="${opt(f)}" onclick="ir(${i})">
`).join("");

/* RENDER */
document.getElementById("contenido").innerHTML=`
<div class="slider">
<button class="flecha izq" onclick="prev()">←</button>
<img id="img" src="${opt(fotos[0])}">
<button class="flecha der" onclick="next()">→</button>
</div>

<div class="miniaturas">${thumbs}</div>

<div class="info">
<h1>${p.TITULO || "Sin título"}</h1>
<p>${p.CIUDAD || ""}</p>
<p class="price">${precio}</p>

<a class="btn" href="https://wa.me/573016492983?text=Hola estoy interesado en ${p.TITULO}">
WhatsApp
</a>
</div>
`;

/* FUNCIONES */
function ir(i){
index=i;
update();
}

function next(){
index=(index+1)%fotos.length;
update();
}

function prev(){
index=(index-1+fotos.length)%fotos.length;
update();
}

function update(){
document.getElementById("img").src = opt(fotos[index]);
}
</script>

</body>
</html>
