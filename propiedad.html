<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle propiedad</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
font-family:Arial;
background:#0b0b0b;
color:white;
margin:0;
}

/* HEADER */
.header{
position:fixed;
top:0;
width:100%;
background:#111;
padding:15px;
z-index:1000;
}

/* CONTENEDOR */
.container{
max-width:900px;
margin:100px auto;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
}

/* 🔥 SLIDER */
.slider{
position:relative;
overflow:hidden;
border-radius:10px;
}

.slider img{
width:100%;
height:350px;
object-fit:cover;
transition:0.3s;
}

/* FLECHAS */
.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
color:white;
border:none;
padding:10px;
border-radius:50%;
cursor:pointer;
font-size:18px;
}

.left{left:10px}
.right{right:10px}

/* MINI */
.miniaturas{
display:flex;
gap:8px;
margin-top:10px;
overflow-x:auto;
}

.miniaturas img{
width:70px;
height:50px;
object-fit:cover;
border-radius:5px;
cursor:pointer;
opacity:.7;
}

.miniaturas img:hover{opacity:1}

/* TEXTO */
.price{
color:#c9a857;
font-size:22px;
margin:10px 0;
}

/* BOTONES */
.actions{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.copy{background:#333;color:white}
.whatsapp{background:#25D366;color:white}
.pdf{background:#c9a857;color:black}

/* FLOAT */
.wa-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:24px;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

/* MOBILE */
@media(max-width:768px){
.slider img{height:220px}
}
</style>
</head>

<body>

<div class="header">
  <div onclick="history.back()" style="cursor:pointer">← Volver</div>
</div>

<div class="container" id="ficha">
  <div class="card">
    <div id="contenido"></div>
  </div>
</div>

<a href="https://wa.me/573016492983" target="_blank" class="wa-float">💬</a>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const urlActual = window.location.href;

function copiar(){
navigator.clipboard.writeText(urlActual);
alert("Link copiado");
}

function enviarWhatsApp(titulo,id){
const mensaje = `Hola, me interesa:\n${titulo}\nID: ${id}\n${urlActual}`;
window.open(`https://wa.me/573016492983?text=${encodeURIComponent(mensaje)}`);
}

function pdf(){
const element=document.getElementById("ficha");
html2pdf().from(element).save();
}

async function cargar(){

const res = await fetch("https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec?action=read_propiedades");
const json = await res.json();
const data = json.data;

const p = data.find(x => String(x.ID || x.id) === String(id));

const key = "visitas_"+id;
let visitas = localStorage.getItem(key) || 0;
visitas++;
localStorage.setItem(key, visitas);

const fotos = [
p.FOTO1,p.FOTO2,p.FOTO3,p.FOTO4,
p.FOTO5,p.FOTO6,p.FOTO7,p.FOTO8,
p.FOTO9,p.FOTO10
].filter(f=>f);

if(fotos.length===0){
fotos.push("https://images.unsplash.com/photo-1560448204-e02f11c3d0e2");
}

let index=0;

/* SLIDER FUNCIONES */
function mostrar(){
document.getElementById("img").src = fotos[index];
}

function next(){
index=(index+1)%fotos.length;
mostrar();
}

function prev(){
index=(index-1+fotos.length)%fotos.length;
mostrar();
}

/* SWIPE */
let startX=0;

function touchStart(e){
startX=e.touches[0].clientX;
}

function touchEnd(e){
let endX=e.changedTouches[0].clientX;
if(startX-endX>50) next();
if(endX-startX>50) prev();
}

const thumbs = fotos.map((f,i)=>`
<img src="${f}" onclick="ir(${i})">
`).join("");

document.getElementById("contenido").innerHTML=`

<div class="slider" ontouchstart="touchStart(event)" ontouchend="touchEnd(event)">
<button class="arrow left" onclick="prev()">←</button>
<img id="img" src="${fotos[0]}">
<button class="arrow right" onclick="next()">→</button>
</div>

<div class="miniaturas">${thumbs}</div>

<h2>${p.TITULO}</h2>
<p>${p.CIUDAD}</p>
<p class="price">$ ${p.PRECIO}</p>

<p>👁 ${visitas} visitas</p>

<p>${p.DESCRIPCION || ''}</p>

<div class="actions">
<button class="btn copy" onclick="copiar()">Copiar</button>
<button class="btn whatsapp" onclick="enviarWhatsApp('${p.TITULO}','${id}')">WhatsApp</button>
<button class="btn pdf" onclick="pdf()">PDF</button>
</div>
`;

window.ir=function(i){
index=i;
mostrar();
}

}

cargar();

</script>

</body>
</html>
