<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Detalle propiedad</title>

<style>
body{font-family:Arial;background:#0b0b0b;color:white;margin:0}

/* VOLVER */
.btn-volver{
position:fixed;
top:20px;
left:20px;
background:#111;
color:white;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
z-index:1000;
}

/* CONTENEDOR */
.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

/* SLIDER */
.slider{position:relative}

.slider img{
width:100%;
height:420px;
object-fit:cover;
border-radius:12px;
}

/* FLECHAS */
.flecha{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
color:white;
border:none;
font-size:25px;
padding:10px;
cursor:pointer;
border-radius:50%;
}

.izq{left:10px}
.der{right:10px}

/* MINIATURAS */
.miniaturas{
display:flex;
gap:10px;
margin-top:10px;
overflow-x:auto;
}

.miniaturas img{
width:90px;
height:65px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
opacity:0.7;
}

.miniaturas img:hover{opacity:1}

.price{
color:#c9a857;
font-size:28px;
font-weight:bold;
}

.btn{
background:#25D366;
padding:15px 25px;
color:white;
display:inline-block;
margin-top:30px;
text-decoration:none;
border-radius:8px;
}

/* ZOOM */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
}

.modal img{
max-width:90%;
max-height:90%;
}
</style>
</head>

<body>

<button class="btn-volver" onclick="volver()">← Volver</button>

<div class="container">
  <div id="contenido"></div>
</div>

<div class="modal" id="modal" onclick="cerrarZoom()">
  <img id="imgZoom">
</div>

<script>
const p = JSON.parse(localStorage.getItem("propiedad"));

const fotos = [
  p.FOTO1,p.FOTO2,p.FOTO3,p.FOTO4,
  p.FOTO5,p.FOTO6,p.FOTO7,p.FOTO8,
  p.FOTO9,p.FOTO10
].filter(f => f && f.startsWith("http"));

let index = 0;

function optimizar(url,size=900){
  if(url.includes("res.cloudinary.com")){
    return url.replace("/upload/", `/upload/w_${size},q_auto,f_auto/`);
  }
  return url;
}

const precio = p.PRECIO 
  ? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(p.PRECIO)
  : "Consultar";

const miniaturasHTML = fotos.map((f,i)=>{
  return `<img src="${optimizar(f,150)}" onclick="irImagen(${i})">`;
}).join("");

document.getElementById("contenido").innerHTML = `
  <div class="slider">
    <button class="flecha izq" onclick="prev()">←</button>
    <img id="imgPrincipal" src="${optimizar(fotos[0])}" onclick="zoom()">
    <button class="flecha der" onclick="next()">→</button>
  </div>

  <div class="miniaturas">${miniaturasHTML}</div>

  <h1>${p.TITULO}</h1>
  <p>${p.CIUDAD}</p>
  <p class="price">${precio}</p>

  <a class="btn" href="https://wa.me/573016492983?text=Hola estoy interesado en ${p.TITULO}">
    WhatsApp
  </a>
`;

function irImagen(i){
  index=i;
  document.getElementById("imgPrincipal").src = optimizar(fotos[index]);
}

function next(){
  index=(index+1)%fotos.length;
  irImagen(index);
}

function prev(){
  index=(index-1+fotos.length)%fotos.length;
  irImagen(index);
}

/* SWIPE */
let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50) next();
  if(endX-startX>50) prev();
});

/* ZOOM */
function zoom(){
  document.getElementById("modal").style.display="flex";
  document.getElementById("imgZoom").src=document.getElementById("imgPrincipal").src;
}

function cerrarZoom(){
  document.getElementById("modal").style.display="none";
}

/* VOLVER */
function volver(){
  window.history.back();
}
</script>

</body>
</html>
