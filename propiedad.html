<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha propiedad</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{font-family:Arial;background:white;color:#111;margin:0}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.slider img{
width:100%;
height:400px;
object-fit:cover;
border-radius:10px;
}

.miniaturas{
display:flex;
gap:8px;
margin-top:10px;
overflow-x:auto;
}

.miniaturas img{
width:80px;
height:60px;
object-fit:cover;
border-radius:5px;
cursor:pointer;
opacity:.7;
}

.price{
font-size:22px;
margin:10px 0;
font-weight:bold;
}

.desc{margin-top:10px}

.actions{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.copy{background:#333;color:white}
.whatsapp{background:#25D366;color:white}
.pdf{background:black;color:white}
</style>
</head>

<body>

<div class="container" id="ficha">
  <div id="contenido"></div>
</div>

<script>

/* ID */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
document.getElementById("contenido").innerHTML="<h2>Error: sin ID</h2>";
throw new Error("Sin ID");
}

const urlActual = window.location.href;

/* FUNCIONES */
function copiar(){
navigator.clipboard.writeText(urlActual);
alert("Link copiado");
}

function compartir(){
const texto = "Mira esta propiedad: " + urlActual;
window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`);
}

/* 🔥 PDF CORREGIDO */
async function pdf(){

const element=document.getElementById("ficha");

/* esperar imágenes */
const imgs = element.querySelectorAll("img");

await Promise.all(Array.from(imgs).map(img=>{
if(img.complete) return Promise.resolve();
return new Promise(res=>{
img.onload=res;
img.onerror=res;
});
}));

html2pdf().set({
margin:0.3,
filename:'propiedad.pdf',
image:{type:'jpeg',quality:1},
html2canvas:{
scale:2,
useCORS:true
},
jsPDF:{unit:'in',format:'letter'}
}).from(element).save();

}

/* CARGAR */
async function cargar(){

const res = await fetch("https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec?action=read_propiedades");
const json = await res.json();
const data = json.data;

const p = data.find(x => String(x.ID || x.id || x.Id) === String(id));

if(!p){
document.getElementById("contenido").innerHTML="<h2>No disponible</h2>";
return;
}

function getCampo(o,keys){
for(let k of keys){
if(o[k]) return o[k];
}
return "";
}

const titulo = getCampo(p,["TITULO","titulo"]);
const ciudad = getCampo(p,["CIUDAD","ciudad"]);
const precioRaw = getCampo(p,["PRECIO","precio"]);
const descripcion = getCampo(p,["DESCRIPCION","descripcion"]);

const precio = precioRaw
? new Intl.NumberFormat('es-CO',{style:'currency',currency:'COP'}).format(precioRaw)
: "Consultar";

/* FOTOS */
const fotos = [
p.FOTO1,p.FOTO2,p.FOTO3,p.FOTO4,
p.FOTO5,p.FOTO6,p.FOTO7,p.FOTO8,
p.FOTO9,p.FOTO10
].filter(f=>f && f.startsWith("http"));

if(fotos.length===0){
fotos.push("https://images.unsplash.com/photo-1560448204-e02f11c3d0e2");
}

function opt(url){
if(url.includes("res.cloudinary.com")){
return url.replace("/upload/","/upload/w_1200,q_auto,f_auto/");
}
return url;
}

const thumbs = fotos.map((f,i)=>`
<img src="${opt(f)}" onclick="ir(${i})">
`).join("");

document.getElementById("contenido").innerHTML=`
<div class="slider">
<img id="img" src="${opt(fotos[0])}" crossorigin="anonymous">
</div>

<div class="miniaturas">${thumbs}</div>

<h1>${titulo}</h1>
<p>${ciudad}</p>
<p class="price">${precio}</p>

<div class="desc">${descripcion}</div>

<div class="actions">
<button class="btn copy" onclick="copiar()">Copiar link</button>
<button class="btn whatsapp" onclick="compartir()">WhatsApp</button>
<button class="btn pdf" onclick="pdf()">PDF</button>
</div>
`;

window.ir=function(i){
document.getElementById("img").src=opt(fotos[i]);
}

}

cargar();

</script>

</body>
</html>
