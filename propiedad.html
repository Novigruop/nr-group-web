<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalle propiedad</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{font-family:Arial;background:#0b0b0b;color:white;margin:0}

/* HEADER */
.header{
position:fixed;
top:0;
width:100%;
background:#111;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.volver{
background:#222;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

/* CONTENEDOR */
.container{
max-width:900px;
margin:100px auto;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
}

.slider img{
width:100%;
height:400px;
object-fit:cover;
border-radius:10px;
}

.miniaturas{
display:flex;
gap:8px;
margin-top:10px;
overflow-x:auto;
}

.miniaturas img{
width:80px;
height:60px;
object-fit:cover;
border-radius:5px;
cursor:pointer;
opacity:.7;
}

.price{
color:#c9a857;
font-size:22px;
margin:10px 0;
}

.actions{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
}

.copy{background:#333;color:white}
.whatsapp{background:#25D366;color:white}
.pdf{background:#c9a857;color:black}

/* WHATSAPP FLOAT */
.wa-float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:24px;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
text-decoration:none;
z-index:9999;
}

</style>
</head>

<body>

<div class="header">
  <div class="volver" onclick="history.back()">← Volver</div>
</div>

<div class="container" id="ficha">
  <div class="card">
    <div id="contenido"></div>
  </div>
</div>

<a href="https://wa.me/573016492983" target="_blank" class="wa-float">💬</a>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const urlActual = window.location.href;

function copiar(){
navigator.clipboard.writeText(urlActual);
alert("Link copiado");
}

function enviarWhatsApp(titulo,id){
const mensaje = `Hola, me interesa esta propiedad:\n🏡 ${titulo}\n🆔 ID: ${id}\n${urlActual}`;
window.open(`https://wa.me/573016492983?text=${encodeURIComponent(mensaje)}`);
}

async function pdf(){
const element=document.getElementById("ficha");
html2pdf().from(element).save();
}

async function cargar(){

const res = await fetch("https://script.google.com/macros/s/AKfycbwWFcQ1nlVsLyiEOFMvSbYAxPHdAqSvKP1qMCvp1BrQkhb6ctod8oSShrj1cBKWzSc/exec?action=read_propiedades");
const json = await res.json();
const data = json.data;

const p = data.find(x => String(x.ID || x.id) === String(id));

/* CONTADOR */
const key = "visitas_"+id;
let visitas = localStorage.getItem(key) || 0;
visitas++;
localStorage.setItem(key, visitas);

const fotos = [
p.FOTO1,p.FOTO2,p.FOTO3,p.FOTO4,
p.FOTO5,p.FOTO6,p.FOTO7,p.FOTO8,
p.FOTO9,p.FOTO10
].filter(f=>f);

const thumbs = fotos.map((f,i)=>`
<img src="${f}" onclick="ir(${i})">
`).join("");

document.getElementById("contenido").innerHTML=`
<img id="img" src="${fotos[0]}">

<div class="miniaturas">${thumbs}</div>

<h2>${p.TITULO}</h2>
<p>${p.CIUDAD}</p>
<p class="price">$ ${p.PRECIO}</p>

<p>👁 ${visitas} visitas</p>

<p>${p.DESCRIPCION || ''}</p>

<div class="actions">
<button class="btn copy" onclick="copiar()">Copiar link</button>
<button class="btn whatsapp" onclick="enviarWhatsApp('${p.TITULO}','${id}')">WhatsApp</button>
<button class="btn pdf" onclick="pdf()">PDF</button>
</div>
`;

window.ir=function(i){
document.getElementById("img").src=fotos[i];
}

}

cargar();

</script>

</body>
</html>
